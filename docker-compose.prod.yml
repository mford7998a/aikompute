version: "3.8"

# ============================================
# PRODUCTION Docker Compose
# Adds: Nginx reverse proxy + Let's Encrypt SSL
# ============================================

services:
  # ============================================
  # Nginx: SSL termination + reverse proxy
  # Users connect to port 80/443 → routes internally
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: inference-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - gateway
      - dashboard
      - aiclient2api
    restart: always
    networks:
      - inference-net

  # ============================================
  # Certbot: Auto-renew Let's Encrypt SSL
  # ============================================
  certbot:
    image: certbot/certbot
    container_name: inference-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Auto-renew check every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - inference-net

  # ============================================
  # AIClient-2-API: Protocol transformation layer
  # NOT exposed to the internet — only via nginx /admin/
  # ============================================
  aiclient2api:
    image: justlikemaki/aiclient-2-api:latest
    container_name: aiclient2api
    # IMPORTANT: No "ports" — not directly exposed to internet
    # Only accessible via nginx /admin/ and internally by gateway
    expose:
      - "3000"
    # OAuth callback ports still need to be exposed for credential setup
    ports:
      - "8085-8087:8085-8087"
      - "1455:1455"
      - "19876-19880:19876-19880"
    volumes:
      - ./aiclient2api-configs:/app/configs
    restart: always
    networks:
      - inference-net

  # ============================================
  # Copilot-API: GitHub Copilot → OpenAI/Anthropic proxy
  # Internal only — not exposed to internet.
  # ============================================
  copilot-api:
    image: ghcr.io/ericc-ch/copilot-api:latest
    container_name: copilot-api
    expose:
      - "4141"
    volumes:
      - ./copilot-api/data:/root/.local/share/copilot-api
    restart: always
    networks:
      - inference-net


  antigravity2api:
    image: ghcr.io/liuw1535/antigravity2api-nodejs:latest
    container_name: antigravity2api
    expose:
      - "8045"
    volumes:
      - ./antigravity2api-nodejs/data:/app/data
      - ./antigravity2api-nodejs/public/images:/app/public/images
      - ./antigravity2api-nodejs/config.json:/app/config.json
      - ./antigravity2api-nodejs/.env:/app/.env
    restart: always
    networks:
      - inference-net

  # ============================================
  # PostgreSQL
  # ============================================
  db:
    image: postgres:16-alpine
    container_name: inference-db
    environment:
      POSTGRES_DB: inference_gateway
      POSTGRES_USER: inference
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    # NOT exposed to internet — remove ports in production
    expose:
      - "5432"
    restart: always
    networks:
      - inference-net

  # ============================================
  # Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: inference-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    restart: always
    networks:
      - inference-net

  # ============================================
  # Billing Gateway
  # ============================================
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: inference-gateway
    expose:
      - "4000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://inference:${DB_PASSWORD}@db:5432/inference_gateway
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - AICLIENT2API_BASE_URL=http://aiclient2api:3000
      - AICLIENT2API_KEY=${AICLIENT2API_KEY}
      - ANTIGRAVITY2API_BASE_URL=http://antigravity2api:8045
      - ANTIGRAVITY2API_KEY=${ANTIGRAVITY2API_KEY:-PLACEHOLDER_KEY}

      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - COPILOT_API_BASE_URL=http://copilot-api:4141
      - OPENROUTER_API_KEYS=${OPENROUTER_API_KEYS:-}
      - OPENROUTER_BASE_URL=https://openrouter.ai/api
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - MASTER_API_KEY=${MASTER_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - db
      - redis
      - aiclient2api
      - copilot-api
    restart: always
    networks:
      - inference-net

  # ============================================
  # Dashboard
  # ============================================
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: inference-dashboard
    expose:
      - "80"
    depends_on:
      - gateway
    restart: always
    networks:
      - inference-net

volumes:
  pgdata:
  redisdata:
  certbot-etc:
  certbot-www:


networks:
  inference-net:
    driver: bridge
