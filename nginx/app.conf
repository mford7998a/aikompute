server {
    listen 80;
    server_name aikompute.com admin.aikompute.com antigravity.aikompute.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================
# Antigravity Admin Panel — antigravity.aikompute.com
# =============================================
server {
    listen 443 ssl;
    http2 on;
    server_name antigravity.aikompute.com;

    ssl_certificate /etc/letsencrypt/live/aikompute.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aikompute.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10M;

    # Everything goes directly to antigravity2api admin panel
    location / {
        proxy_pass http://antigravity2api:8045/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# =============================================
# Admin Panel — admin.aikompute.com
# =============================================
server {
    listen 443 ssl;
    http2 on;
    server_name admin.aikompute.com;

    ssl_certificate /etc/letsencrypt/live/aikompute.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aikompute.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10M;

    # Everything goes directly to aiclient2api — no path rewriting needed
    location / {
        proxy_pass http://aiclient2api:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# =============================================
# Main Site — aikompute.com
# =============================================
server {
    listen 443 ssl;
    http2 on;
    server_name aikompute.com;

    ssl_certificate /etc/letsencrypt/live/aikompute.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aikompute.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;

    client_max_body_size 10M;

    # OpenAI-compatible API
    location /v1/ {
        proxy_pass http://gateway:4000/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding on;
    }

    # Gateway management API
    location /api/ {
        proxy_pass http://gateway:4000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://gateway:4000/health;
    }

    location /docs {
        proxy_pass http://gateway:4000/docs;
    }

    location /openapi.json {
        proxy_pass http://gateway:4000/openapi.json;
    }

    # Dashboard (catch-all)
    location / {
        proxy_pass http://dashboard:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
